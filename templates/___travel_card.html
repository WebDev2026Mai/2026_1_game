<section class="travel_card" id="travel-{{travel.travel_pk}}">
        <h1>{{travel.travel_title}}</h1>
        <h2>{{travel.travel_country}}</h2>
        <h3>{{travel.travel_location}}</h3>
        <div>
            <li><p>{{travel.travel_date_from}}</p></li>
            <li><p>{{travel.travel_date_to}}</p></li>
        </div>
        <p>{{travel.travel_description}}</p>

        <div class="buttons">
            <button class="button" popovertarget="confirm-{{travel.travel_pk}}">DELETE</button>
            <a class="button" href="/updatetravel/{{ travel.travel_pk }}">UPDATE</a>
        </div>
        <div id="confirm-{{travel.travel_pk}}" popover>
            <p>Delete this travel?</p>
            <button class="button" mix-delete="/travels/{{ travel.travel_pk }}">Yes</button>
            <button class="button" popovertarget="confirm-{{travel.travel_pk}}" popovertargetaction="hide">Cancel</button>
        </div>
    </section>
