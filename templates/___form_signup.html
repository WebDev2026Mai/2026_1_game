<form mix-post="/api-create-user" autocomplete="off" id="form_signup">
    <div>
        <label> First name</label>
        <p><span id="USER_FIRST_NAME_MIN">{{x.USER_FIRST_NAME_MIN}}</span>  to <span id="USER_FIRST_NAME_MAX">{{x.USER_FIRST_NAME_MAX}}</span> characters</p>
        <input type="text" aria-label="user firstname" placeholder="user firstname" id="user_first_name" name="user_first_name"  mix-validate="{{x.REGEX_USER_FIRST_NAME}}" >
    </div>
    <div>
        <label> Last name </label>
        <p><span id="USER_FIRST_NAME_MIN">{{x.USER_LAST_NAME_MIN}}</span>  to <span id="USER_FIRST_NAME_MAX">{{x.USER_LAST_NAME_MAX}}</span> characters</p>
        <input type="text" aria-label="user lastname"  placeholder="user lastname"  id="user_last_name"  name="user_last_name"   mix-validate="{{x.REGEX_USER_LAST_NAME}}">
    </div>
    <div>
        <label> Email </label>
        <input type="text" aria-label="email"          placeholder="user email"     id="user_email"      name="user_email"       mix-validate="{{x.REGEX_USER_EMAIL}}">
    </div>
    <div>
        <label> Password </label>
        <p><span id="USER_FIRST_NAME_MIN">{{x.USER_PASSWORD_MIN}}</span>  to <span id="USER_FIRST_NAME_MAX">{{x.USER_PASSWORD_MAX}}</span> characters</p>
        <input type="text" aria-label="user password"  placeholder="user password"  id="user_password"   name="user_password"    mix-validate="{{x.REGEX_USER_PASSWORD}}">
    </div>
    <button id="signup">SIGNUP</button>
</form>
